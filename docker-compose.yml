version: "3.9"

services:
  clouddrive:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clouddrive-pro
    environment:
      PORT: 4000
      DATABASE_URL: "file:./dev.db"
      JWT_SECRET: "change-me"
      UPLOAD_ROOT: "./uploads"
      FRONTEND_DIST: "../frontend/dist"
      MAX_QUOTA_BYTES: 1073741824
    ports:
      - "4000:4000"
    volumes:
      - clouddrive-db:/app/apps/backend/prisma
      - clouddrive-uploads:/app/apps/backend/uploads

volumes:
  clouddrive-db:
  clouddrive-uploads:
