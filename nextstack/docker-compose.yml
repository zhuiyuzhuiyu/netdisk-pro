services:
  app:
    build: .
    container_name: clouddrive-next
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - STORAGE_DIR=/app/data/uploads
    volumes:
      - uploads:/app/data/uploads
    expose:
      - "3000"
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=clouddrive
      - POSTGRES_USER=clouddrive
      - POSTGRES_PASSWORD=clouddrive
    volumes:
      - pgdata:/var/lib/postgresql/data
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./ops/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
volumes:
  pgdata:
  uploads:
